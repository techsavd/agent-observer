version: 2

project_name: agent-observer

before:
  hooks:
    - go mod tidy

builds:
  - id: agent-observer
    main: ./cmd/agent-observer
    binary: agent-observer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/techsavd/agent-observer/internal/app.Version={{ .Version }}
      - -X github.com/techsavd/agent-observer/internal/app.Commit={{ .Commit }}
      - -X github.com/techsavd/agent-observer/internal/app.BuildDate={{ .Date }}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - CHANGELOG.md
      - SECURITY.md
      - docs/*
      - completions/*
      - man/*
      - scripts/install-snapshot
      - scripts/macos-sign-notarize
      - scripts/smoke-test

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
